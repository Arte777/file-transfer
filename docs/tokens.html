<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Украденные Токены Roblox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=7">
</head>
<body>

  <div id="headerSlot"></div>

  <div class="container">
    <div class="controls">
      <h2 style="font-size:1.4rem; font-weight:800; letter-spacing:-0.5px;">База токенов</h2>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <button class="sort-btn active" id="btnSortDate">По новизне</button>
        <button class="sort-btn" id="btnSortRobux">По Robux</button>
      </div>
    </div>
    
    <div id="tokensContainer" class="tokens-grid">
      <div class="loading">Загрузка токенов...</div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="assets/config.js?v=7"></script>
  <script src="assets/app.js?v=7"></script>
  <script src="assets/tokens.js?v=7"></script>
</body>
</html>
